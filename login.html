<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - TYM (Talk Your Mind)</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <!-- Background Animation -->
    <div class="background">
        <div class="gradient-bg"></div>
        <div class="blur-blob blob1"></div>
        <div class="blur-blob blob2"></div>
        <div class="blur-blob blob3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Back Button -->
        <a href="landing.html" class="back-button">← Back</a>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Login to see your secret messages.</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="login-form">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="username-input-wrapper">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-input username-input"
                            placeholder="Enter your username"
                            required
                            autocomplete="username"
                        >
                        <span class="input-icon">👤</span>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input password-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <span class="input-icon">🔒</span>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            👁️
                        </button>
                    </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="form-group remember-me-group">
                    <label class="remember-me-label">
                        <input
                            type="checkbox"
                            id="rememberMe"
                            name="rememberMe"
                            class="remember-me-checkbox"
                        >
                        <span class="checkbox-custom"></span>
                        <span class="remember-me-text">Remember me</span>
                    </label>
                </div>

                <!-- Error Message Container -->
                <div id="errorMessage" class="error-message hidden">
                    <span id="errorText"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Log In</span>
                    <span class="btn-spinner hidden" id="btnSpinner">
                        <span class="spinner"></span>
                    </span>
                </button>
            </form>

            <!-- Sign Up Link -->
            <div class="signup-link">
                New here? <a href="./signup.html" class="link">Claim your link</a>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
