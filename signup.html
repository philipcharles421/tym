<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TYM (Talk Your Mind)</title>
    <link rel="stylesheet" href="signup-style.css">
</head>
<body>
    <!-- Background Animation -->
    <div class="background">
        <div class="gradient-bg"></div>
        <div class="blur-blob blob1"></div>
        <div class="blur-blob blob2"></div>
        <div class="blur-blob blob3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Back Button -->
        <a href="landing.html" class="back-button">← Back</a>

        <!-- Sign Up Card -->
        <div class="signup-card">
            <!-- Header -->
            <div class="signup-header">
                <h1 class="signup-title">Claim Your Link</h1>
                <p class="signup-subtitle">Start receiving anonymous photos in seconds.</p>
            </div>

            <!-- Form -->
            <form id="signupForm" class="signup-form">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="username-input-wrapper">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-input username-input"
                            placeholder="Choose your username"
                            required
                            autocomplete="off"
                        >
                        <span class="input-icon">👤</span>
                    </div>
                    <!-- Live Preview -->
                    <div class="link-preview">
                        <p class="preview-label">Your link:</p>
                        <p class="preview-link">
                            <span class="domain">tym.com/</span><span class="preview-username" id="previewUsername">username</span>
                        </p>
                    </div>
                    <!-- Username Validation Feedback -->
                    <div class="validation-feedback">
                        <span id="usernameError" class="error-text hidden"></span>
                        <span id="usernameSuccess" class="success-text hidden">✓ Available</span>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input password-input"
                            placeholder="At least 8 characters"
                            required
                            autocomplete="new-password"
                            minlength="8"
                        >
                        <span class="input-icon">🔒</span>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            👁️
                        </button>
                    </div>
                    <p class="password-hint">At least 8 characters recommended</p>
                </div>

                <!-- Error Message Container -->
                <div id="errorMessage" class="error-message hidden">
                    <span id="errorText"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Create My Account</span>
                    <span class="btn-spinner hidden" id="btnSpinner">
                        <span class="spinner"></span>
                    </span>
                </button>

                <!-- Terms -->
                <p class="terms-text">
                    By signing up, you agree to our <a href="./terms.html" class="terms-link">Terms of Service</a> and <a href="./privacy.html" class="terms-link">Privacy Policy</a>
                </p>
            </form>

            <!-- Sign In Link -->
            <div class="signin-link">
                Already have an account? <a href="./login.html" class="link">Sign In</a>
            </div>
        </div>
    </div>

    <script type="module" src="signup.js"></script>
</body>
</html>
